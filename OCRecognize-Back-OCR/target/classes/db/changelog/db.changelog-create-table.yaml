                  constraints:
                    nullable: false
                  name: nic
                  type: BIGINT
              - column:
                  constraints:
                    nullable: false
                  name: siret
                  type: BIGINT
              - column:
                  constraints:
                    nullable: false
                  name: datefin
                  type: VARCHAR(250)
              - column:
                  constraints:
                    nullable: false
                  name: datedebut
                  type: VARCHAR(250)
              - column:
                  constraints:
                    nullable: false
